default:
  image: golang:1.24-bookworm

stages:
  - test

variables:
  GOFLAGS: "-mod=readonly"

unit:
  stage: test
  before_script:
    - cd src
    - go install gotest.tools/gotestsum@latest
  script:
    - make ci-unit
  artifacts:
    paths:
      - src/junit-unit.xml
    reports:
      junit: src/junit-unit.xml

e2e:
  stage: test
  image: golang:1.24-bookworm
  services:
    - name: docker:24-dind
      alias: docker
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
  before_script:
    - cd src
    - go install gotest.tools/gotestsum@latest
    - go install github.com/boumenot/gocover-cobertura@latest
    - go install github.com/pressly/goose/v3/cmd/goose@v3.26.0
  script:
    - make ci-e2e
    - make cobertura
    # GitLab expects paths relative to repo root; Go uses module path (etruscan/...)
    - sed -i 's|etruscan/|src/|g' cobertura.xml
  coverage: '/total:.*\s+(\d+\.\d+)%/'
  artifacts:
    paths:
      - src/junit-e2e.xml
      - src/coverage.out
      - src/cobertura.xml
    reports:
      junit: src/junit-e2e.xml
      coverage_report:
        coverage_format: cobertura
        path: src/cobertura.xml
