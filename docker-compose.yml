services:
  api:
    container_name: etruscan-api
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: etruscan
      REDIS_ADDR: redis:6379
      JWT_SECRET: guesswhosbackbackagain
      DEFAULT_MIN_APPROVALS: 2
      PRODUCTION_MODE: false
      GUARDRAIL_CHECK_INTERVAL_MINUTES: 2
      
      NOTIFICATIONS_ENABLED: true
      NOTIFY_TELEGRAM_ENABLED: true
      NOTIFY_TELEGRAM_BOT_TOKEN: 8666261497:AAHusEBf7L78T9yx2QN_HCZwDvJMixunAbo
      NOTIFY_EMAIL_ENABLED: true
      NOTIFY_EMAIL_FROM: noreply@etruscan.com

      NOTIFY_MIN_INTERVAL_SECONDS_HIGH: 60
      NOTIFY_MIN_INTERVAL_SECONDS_LOW: 300
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://localhost:8080/api/v1/health" ]
      interval: 30s
      timeout: 2s
      retries: 20
      start_period: 10s

  ui:
    container_name: etruscan-ui
    build: ./ui/experiment-insights

  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - ui

  postgres:
    image: postgres:16-alpine
    container_name: etruscan-postgres
    command: [ "postgres", "-c", "log_statement=all", "-c", "log_destination=stderr" ]
    environment:
      POSTGRES_DB: etruscan
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d etruscan -h 127.0.0.1 -p 5432" ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: etruscan-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
volumes:
  postgres_data:
  redis_data:
