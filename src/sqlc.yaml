version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "db/migrations"
    queries:
      - "db/queries"
    gen:
      go:
        package: "database"
        out: "./internal/database/generated"
        sql_package: "pgx/v5"
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"